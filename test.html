<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Test | Classroom Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer { background: #fee2e2; color: #ef4444; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .question-text { font-size: 1.3rem; color: #1e293b; margin-bottom: 20px; min-height: 60px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.3s; }
        .option-btn:hover { border-color: var(--primary); background: #eff6ff; }
        .selected { background: #dbeafe !important; border-color: var(--primary) !important; font-weight: bold; }
        .footer { margin-top: 20px; display: flex; justify-content: flex-end; }
        #next-btn, #submit-btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #result-screen { display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-screen">
        <div class="header">
            <span id="q-count" style="color: #64748b; font-weight: bold;">Question 1 of 3</span>
            <span class="timer" id="timer-display">05:00</span>
        </div>

        <div class="question-text" id="q-text">Loading question...</div>
        
        <div id="options-container">
            </div>

        <div class="footer">
            <button id="next-btn" onclick="handleNext()">Next Question</button>
            <button id="submit-btn" style="display:none;" onclick="finishTest()">Submit Test</button>
        </div>
    </div>

    <div class="quiz-container" id="result-screen">
        <h2 style="color: var(--primary);">टेस्ट पूरा हुआ!</h2>
        <p style="font-size: 1.2rem;">आपका फाइनल स्कोर:</p>
        <h1 id="final-score" style="font-size: 3rem; margin: 10px 0;">0</h1>
        <button onclick="window.location.href='index.html'" style="background:#64748b; color:white; border:none; padding:10px 20px; border-radius:10px;">Dashboard पर जाएँ</button>
    </div>

    <script>
        // 1. शुद्ध Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAowFaiWGyQhrLOs7117qEw9SDKPd-MoMA",
            authDomain: "himanshi-2009.firebaseapp.com",
            databaseURL: "https://himanshi-2009-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "himanshi-2009",
            storageBucket: "himanshi-2009.appspot.com",
            messagingSenderId: "373651988529",
            appId: "1:373651988529:web:46c5c603601f6dc522f510"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 2. Questions Data
        const questions = [
            { q: "विद्युत क्षेत्र की तीव्रता का मात्रक क्या है?", opts: ["Newton (N)", "Newton/Coulomb (N/C)", "Joule (J)", "Watt (W)"], ans: 1 },
            { q: "गाउस का नियम किससे संबंधित है?", opts: ["चुंबकीय फ्लक्स", "विद्युत फ्लक्स", "विद्युत धारा", "विभव"], ans: 1 },
            { q: "आवेश का मात्रक क्या होता है?", opts: ["Coulomb", "Volt", "Ampere", "Ohm"], ans: 0 }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedOption = null;

        // 3. Load Question
        function displayQuestion() {
            const q = questions[currentIdx];
            document.getElementById("q-count").innerText = `Question ${currentIdx + 1} of ${questions.length}`;
            document.getElementById("q-text").innerText = q.q;
            
            const optBox = document.getElementById("options-container");
            optBox.innerHTML = "";
            
            q.opts.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    selectedOption = i;
                    document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                };
                optBox.appendChild(btn);
            });
        }

        // 4. Next Button Logic
        function handleNext() {
            if (selectedOption === null) {
                alert("कृपया एक विकल्प चुनें!");
                return;
            }

            if (selectedOption === questions[currentIdx].ans) {
                score += 4;
            } else {
                score -= 1;
            }

            selectedOption = null;
            currentIdx++;

            if (currentIdx < questions.length) {
                displayQuestion();
            } else {
                document.getElementById("next-btn").style.display = "none";
                document.getElementById("submit-btn").style.display = "block";
            }
        }

        // 5. Submit to Firebase RTDB
        function finishTest() {
            const user = firebase.auth().currentUser;
            const finalScoreValue = score;

            if (user) {
                db.ref('test_results/' + user.uid).push({
                    subject: "Physics Ch-1",
                    score: finalScoreValue,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    showResult(finalScoreValue);
                });
            } else {
                showResult(finalScoreValue);
            }
        }

        function showResult(s) {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = s;
        }

        // Start when page loads
        window.onload = displayQuestion;

    </script>
</body>
</html>
