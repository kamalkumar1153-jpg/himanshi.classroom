<script>
// Firebase config (same as tumhara fixed)
const firebaseConfig = {
  apiKey: "AIzaSyAowFaiWGyQhrLOs7117qEw9SDKPd-MoMA",
  authDomain: "himanshi-2009.firebaseapp.com",
  databaseURL: "https://himanshi-2009-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "himanshi-2009",
  storageBucket: "himanshi-2009.firebasestorage.app",
  messagingSenderId: "373651988529",
  appId: "1:373651988529:web:46c5c603601f6dc522f510"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// 🔐 Google Login
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 📚 Load Questions from Firebase
let questions = [];
let i=0, score=0, selected=null;

function loadQuestions(){
  db.ref("questions").once("value", snap=>{
    questions = snap.val();
    if(!questions){
      document.getElementById("question").innerText="No questions found";
      return;
    }
    loadQ();
  });
}

// 📌 Load Question
function loadQ(){
  let q = questions[i];

  document.getElementById("count").innerText =
    `Question ${i+1}/${questions.length}`;

  document.getElementById("question").innerText = q.q;

  let opt="";
  q.o.forEach((x,index)=>{
    opt+=`<div class="option" onclick="select(${index},this)">${x}</div>`;
  });

  document.getElementById("options").innerHTML=opt;
}

// Select
function select(idx,el){
  selected=idx;
  document.querySelectorAll(".option").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
}

// Next
function nextQ(){
  if(selected==null){ alert("Select option"); return; }

  if(selected==questions[i].a) score+=4;
  else score-=1;

  selected=null;
  i++;

  if(i<questions.length) loadQ();
  else finish();
}

// Finish
function finish(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText=score;

  let user=auth.currentUser;
  if(user){
    db.ref("leaderboard").push({
      name:user.displayName,
      score:score
    });
  }
}

// Start
document.addEventListener("DOMContentLoaded", ()=>{
  loadQuestions();
});
</script>
<button onclick="window.location.href='leaderboard.html'">
  View Leaderboard
</button>
