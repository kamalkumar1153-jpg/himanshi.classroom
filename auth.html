<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Classroom Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1e3a8a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: #1e3a8a; color: white; }
        .btn-secondary { background: #f1f5f9; color: #64748b; font-size: 0.9rem; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="auth-title">लॉगिन (Login)</h2>
        <input type="email" id="email" placeholder="ईमेल (Email)">
        <input type="password" id="password" placeholder="पासवर्ड (Password)">
        
        <button class="btn btn-primary" id="main-btn" onclick="handleAuth()">प्रवेश करें</button>
        <button class="btn btn-secondary" id="toggle-btn" onclick="toggleAuth()">नया अकाउंट बनाएँ (Sign Up)</button>
        
        <p class="error-msg" id="error-text">गलत विवरण!</p>
    </div>

    <script>
        // 1. आपका Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAowFaiWGyQhrLOs7117qEw9SDKPd-MoMA",
            authDomain: "himanshi-2009.firebaseapp.com",
            databaseURL: "https://himanshi-2009-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "himanshi-2009",
            storageBucket: "himanshi-2009.appspot.com",
            messagingSenderId: "373651988529",
            appId: "1:373651988529:web:46c5c603601f6dc522f510"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let isLogin = true;

        // लॉगिन और साइन-अप के बीच स्विच करने के लिए
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById("auth-title").innerText = isLogin ? "लॉगिन (Login)" : "नया अकाउंट बनाएँ";
            document.getElementById("main-btn").innerText = isLogin ? "प्रवेश करें" : "रजिस्टर करें";
            document.getElementById("toggle-btn").innerText = isLogin ? "नया अकाउंट बनाएँ (Sign Up)" : "पहले से अकाउंट है? लॉगिन करें";
        }

        // मेन फंक्शन
        function handleAuth() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorText = document.getElementById("error-text");

            if (!email || !password) {
                alert("कृपया सभी जानकारी भरें!");
                return;
            }

            if (isLogin) {
                // लॉगिन लॉजिक
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => window.location.href = "index.html")
                    .catch(err => {
                        errorText.style.display = "block";
                        errorText.innerText = "लॉगिन फेल: " + err.message;
                    });
            } else {
                // साइन-अप लॉजिक
                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => {
                        alert("अकाउंट बन गया! अब आप लॉगिन कर सकते हैं।");
                        toggleAuth();
                    })
                    .catch(err => {
                        errorText.style.display = "block";
                        errorText.innerText = "साइन-अप फेल: " + err.message;
                    });
            }
        }
    </script>
</body>
</html>
